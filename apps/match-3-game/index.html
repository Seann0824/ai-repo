<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>消消乐 - Match 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="score-board">
                <div class="score-item">
                    <span class="label">得分</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">步数</span>
                    <span id="moves" class="value">30</span>
                </div>
                <div class="score-item">
                    <span class="label">目标</span>
                    <span id="target" class="value">1000</span>
                </div>
            </div>
        </header>

        <div class="game-board-container">
            <div id="gameBoard" class="game-board"></div>
        </div>

        <div class="game-controls">
            <button id="restartBtn" class="btn-restart">🔄 重新开始</button>
            <button id="hintBtn" class="btn-hint">💡 提示</button>
        </div>

        <!-- 游戏结束弹窗 -->
        <div id="gameOverModal" class="modal hidden">
            <div class="modal-content">
                <h2 id="gameOverTitle">游戏结束</h2>
                <p id="gameOverText">最终得分: 0</p>
                <button id="playAgainBtn" class="btn-primary">再玩一次</button>
            </div>
        </div>

        <!-- 开始游戏弹窗 -->
        <div id="startModal" class="modal">
            <div class="modal-content">
                <h2>🎮 消消乐</h2>
                <p>交换相邻宝石，3个或以上相同颜色连成一线即可消除</p>
                <p>达到目标分数即可过关！</p>
                <button id="startBtn" class="btn-primary">开始游戏</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
